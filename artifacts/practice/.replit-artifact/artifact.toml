kind = "web"
previewPath = "/"
title = "IGCSE Add Maths Crash Practice"
version = "1.0.0"
id = "artifacts/practice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18485

[services.development]
run = "pnpm --filter @workspace/practice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/practice", "run", "build" ]
publicDir = "artifacts/practice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18485"
BASE_PATH = "/"
